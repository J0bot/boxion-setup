# Boxion edge proxy (L4+L7)
# - stream 443: TLS passthrough by SNI -> IPv6 clients or default to local Caddy 8443
# - http 80   : Host-based routing -> IPv6 clients or default to local Caddy 8080
# Notes:
# - Expects dynamic maps in /etc/nginx/boxion/{tls.map,http.map}
# - Container should run with --network host to bind host 80/443

user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events { worker_connections  1024; }

# L4 TLS passthrough
stream {
    map $ssl_preread_server_name $boxion_sni_upstream {
        include /etc/nginx/boxion/tls.map;
        # Forward everything else to Caddy service (docker) on 8443
        default caddy:8443;
    }

    server {
        listen 0.0.0.0:443 reuseport;
        listen [::]:443 reuseport;
        proxy_pass $boxion_sni_upstream;
        ssl_preread on;
        proxy_connect_timeout 5s;
        proxy_timeout 600s;
    }
}

# L7 HTTP Host routing
http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    access_log  /var/log/nginx/access.log;
    sendfile        on;
    keepalive_timeout  65;

    map $host $boxion_http_upstream {
        include /etc/nginx/boxion/http.map;
        # Forward everything else to Caddy service (docker) on 8080
        default caddy:8080;
    }

    server {
        # Default server to capture all HTTP
        listen 0.0.0.0:80 default_server;
        listen [::]:80 default_server;
        access_log off;
        location / {
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 3s;
            proxy_read_timeout 60s;
            proxy_pass http://$boxion_http_upstream;
        }
    }
}
