user nginx;
worker_processes auto;

events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile on;
  access_log /var/log/nginx/access.log;
  error_log  /var/log/nginx/error.log warn;

  server {
    listen 8080;
    server_name _;

    root /var/www/boxion;
    index index.html index.php;

    # Admin UI (React SPA)
    location = /admin { return 301 /admin/; }
    location /admin/ {
      alias /usr/share/boxion-admin/;
      index index.html;
      # Optionally include auth directives if present
      # Create /etc/nginx/conf.d/admin-auth.conf with:
      #   auth_basic "Restricted";
      #   auth_basic_user_file /etc/nginx/.htpasswd-boxion;
      # And mount the htpasswd file via docker-compose
      include /etc/nginx/conf.d/admin-auth*.conf;
      try_files $uri $uri/ /admin/index.html;
    }

    # API
    location = /api { return 301 /api/; }
    location /api/ {
      index index.php;
      try_files $uri /api/index.php;
    }
    location ~ ^/api/.*\.php$ {
      include fastcgi_params;
      fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
      fastcgi_param HTTP_AUTHORIZATION $http_authorization;
      fastcgi_pass 127.0.0.1:9000;
    }

    # Static
    location / {
      try_files $uri $uri/ /index.html;
    }

    location ~ /\.env { deny all; }
  }
}
